apiVersion: v1
kind: Service
metadata:
  name: wishlist-svc
  namespace: wishlist
  labels:
    app: wishlist-app
spec:
  selector:
    app: wishlist-app                # Roteia tráfego para pods com este label
  ports:
    - name: http
      protocol: TCP
      port: 80                       # Porta exposta pelo Service
      targetPort: 8080               # Porta do container
  type: ClusterIP                    # Acessível apenas dentro do cluster
